<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <h1>Contact Me</h1>

    <form method="POST">
        <input class="form-control my-2" name="name" placeholder="Your Name">
        <input class="form-control my-2" name="email" placeholder="Your Email">
        <textarea class="form-control my-2" name="message" placeholder="Message"></textarea>
        <button class="btn btn-success">Send</button>
    </form>
</div>

</body>
</html>
